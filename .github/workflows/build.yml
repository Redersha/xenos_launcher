name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            artifact: macos-arm64
          - os: windows-latest
            platform: win-x64
            artifact: windows-x64
          - os: ubuntu-latest
            platform: linux-x64
            artifact: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run bundle

      - run: node scripts/pack-dist.mjs ${{ matrix.platform }}
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: xenos-launcher-${{ matrix.artifact }}
          path: dist-pkg/xenos-launcher-${{ matrix.artifact }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
